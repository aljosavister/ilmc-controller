<!DOCTYPE html>
<html>
  <head>
    <title>Camper module BLE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f1eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Camper BLE" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href='data:application/manifest+json,{"name":"Camper module BLE","short_name":"Camper BLE","display":"standalone","background_color":"#f4f1eb","theme_color":"#736b92"}' />
    <style>
      :root {
        --accent: #736b92;
        --accent-dark: #5f587c;
        --bg: #f4f1eb;
        --card: #fffdf8;
        --button-off: #e7e3dc;
        --line: #ddd6ca;
        --ink: #222;
        --muted: #6a6259;
        --ok: #2f6f4e;
        --warn: #8a5a16;
      }
      * { box-sizing: border-box; }
      html { color: var(--ink); font-family: Arial, sans-serif; }
      body {
        background: linear-gradient(180deg, #fff 0%, var(--bg) 100%);
        margin: 0 auto;
        max-width: 680px;
        min-height: 100vh;
        padding: 12px 16px 18px;
      }
      header {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        justify-content: space-between;
      }
      h1 { font-size: 1.65rem; line-height: 1.05; margin: 0; }
      h2 { font-size: 1.15rem; margin: 0 0 12px; }
      .hint { color: var(--muted); font-size: 0.92rem; line-height: 1.25; margin: 6px 0 0; }
      .top-actions { display: flex; gap: 8px; margin: 12px 0 8px; }
      .status {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.25;
        margin: 8px 0 10px;
        min-height: 34px;
        padding: 8px 12px;
      }
      .status.connected { color: var(--ok); }
      .status.warning { color: var(--warn); }
      .tabs {
        background: #eee9df;
        border: 1px solid var(--line);
        display: flex;
        gap: 4px;
        margin-top: 10px;
        padding: 4px;
      }
      .tab-button {
        background: transparent;
        color: #39342e;
        flex: 1;
        margin: 0;
        padding: 10px 6px;
      }
      .tab-button.active {
        background: var(--accent);
        color: #fff;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-top: 0;
        padding: 16px;
      }
      .row { align-items: center; display: flex; gap: 12px; margin: 13px 0; }
      .row label:first-child { flex: 1; font-size: 1.02rem; }
      .actions { margin-top: 16px; }
      button {
        background: var(--accent);
        border: 0;
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
        margin: 0;
        padding: 11px 14px;
      }
      button.secondary { background: var(--button-off); color: #312d28; }
      button.danger { background: #8b5049; }
      button:disabled { background: #d8d8d8; color: #555; }
      button:active { background: var(--accent-dark); transform: scale(0.98); }
      input[type="checkbox"], input[type="radio"] {
        accent-color: var(--accent);
        height: 30px;
        width: 30px;
      }
      input[type="number"], select {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 18px;
        font-size: 1rem;
        min-height: 38px;
        min-width: 96px;
        padding: 6px 10px;
      }
      .muted { color: var(--muted); font-size: 0.95rem; line-height: 1.3; }
      .button-row { display: flex; flex-wrap: wrap; gap: 8px; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Camper module</h1>
        <p class="hint" id="introHint">Open in Bluefy while the controller is in setup mode.</p>
      </div>
    </header>

    <div class="top-actions">
      <button id="connectButton" onclick="connectBle()">Connect BLE</button>
      <button id="refreshButton" class="secondary" onclick="refreshConfiguration()" disabled>Refresh</button>
    </div>
    <div id="status" class="status">Not connected</div>

    <section id="app" hidden>
      <nav class="tabs">
        <button id="sensorsTabButton" class="tab-button active" onclick="showTab('sensorsTab')">Sensors</button>
        <button id="pumpTabButton" class="tab-button" onclick="showTab('pumpTab')">Water pump</button>
        <button id="exitTabButton" class="tab-button" onclick="showTab('exitTab')">Exit</button>
      </nav>

      <div id="sensorsTab" class="card">
        <h2>Sensors</h2>
        <div class="row">
          <label>Last temperature</label>
          <strong id="lastTemperature">-</strong>
        </div>
        <div class="row">
          <label>Last humidity</label>
          <strong id="lastHumidity">-</strong>
        </div>
        <p class="muted" id="lastEnvironmentStatus"></p>
        <div class="row">
          <label>Min 24h</label>
          <strong id="temperatureMin24h">-</strong>
        </div>
        <div class="row">
          <label>Max 24h</label>
          <strong id="temperatureMax24h">-</strong>
        </div>
        <p class="muted" id="temperatureStatsStatus"></p>
        <div class="row">
          <label for="FLOWMETER">Flow meter</label>
          <input type="checkbox" id="FLOWMETER" />
          <select id="FLOWMETERPin"></select>
        </div>
        <div class="row">
          <label for="Environment">Environment</label>
          <input type="checkbox" id="Environment" onchange="changeEnvironment(this)" />
        </div>
        <div class="row">
          <label for="SHT2X">SHT2X</label>
          <input type="radio" name="EnvironmentSensor" id="SHT2X" />
        </div>
        <div class="row">
          <label for="BME280">BME280</label>
          <input type="radio" name="EnvironmentSensor" id="BME280" />
        </div>
        <div class="actions">
          <button onclick="saveSensors()">Save sensors</button>
        </div>
      </div>

      <div id="pumpTab" class="card" hidden>
        <h2>Water pump</h2>
        <div class="row"><label>Status</label><strong id="pumpStatus">-</strong></div>
        <div class="row">
          <label for="invertPWSignal">Invert signal</label>
          <input type="checkbox" id="invertPWSignal" />
        </div>
        <div class="row" id="autoStopRow">
          <label for="autoStopSeconds">Auto-stop seconds</label>
          <input type="number" min="1" step="1" id="autoStopSeconds" />
        </div>
        <div class="row" id="noFlowStopRow">
          <label for="noFlowStopSeconds">No-flow stop seconds</label>
          <input type="number" min="1" step="1" id="noFlowStopSeconds" />
        </div>
        <p class="muted" id="pumpHint"></p>
        <div class="actions button-row">
          <button onclick="savePump()">Save pump</button>
          <button class="secondary" onclick="sendCommandAndRefresh({ command: 'startPump' })">Start</button>
          <button class="secondary" onclick="sendCommandAndRefresh({ command: 'stopPump' })">Stop</button>
        </div>
      </div>

      <div id="exitTab" class="card" hidden>
        <h2>Exit setup</h2>
        <p class="muted">Stops setup mode and returns the controller to normal low-power operation.</p>
        <div class="actions">
          <button class="danger" onclick="exitSetup()">Exit setup</button>
        </div>
      </div>
    </section>

    <script>
      const serviceUuid = "abd39c82-951e-4acb-944d-ba04db3e1e03";
      const configurationUuid = "abd39c82-951e-4acb-944d-ba04db3e1e05";
      const commandUuid = "abd39c82-951e-4acb-944d-ba04db3e1e06";
      const statusUuid = "abd39c82-951e-4acb-944d-ba04db3e1e07";

      let bleDevice = null;
      let configurationCharacteristic = null;
      let commandCharacteristic = null;
      let statusCharacteristic = null;
      let currentConfiguration = null;

      function writeStatus(message, type = "") {
        const status = document.getElementById("status");
        status.textContent = message;
        status.className = `status ${type}`.trim();
      }
      function decodeValue(value) { return new TextDecoder("utf-8").decode(value); }
      function encodeValue(value) { return new TextEncoder().encode(value); }

      async function connectBle() {
        try {
          if (!navigator.bluetooth) { writeStatus("Web Bluetooth is not available in this browser.", "warning"); return; }
          writeStatus("Requesting BLE device ...");
          bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ services: [serviceUuid] }], optionalServices: [serviceUuid] });
          writeStatus(`Connecting to ${bleDevice.name || "BLE device"} ...`);
          const server = await bleDevice.gatt.connect();
          const service = await server.getPrimaryService(serviceUuid);
          configurationCharacteristic = await service.getCharacteristic(configurationUuid);
          commandCharacteristic = await service.getCharacteristic(commandUuid);
          statusCharacteristic = await service.getCharacteristic(statusUuid);
          document.getElementById("connectButton").disabled = true;
          document.getElementById("refreshButton").disabled = false;
          document.getElementById("app").hidden = false;
          showTab("sensorsTab");
          await refreshConfiguration();
        } catch (error) { writeStatus(error && error.message ? error.message : String(error), "warning"); }
      }

      async function refreshConfiguration() {
        await sendCommand({ command: "configuration" }, false);
        await readConfiguration();
      }

      async function readConfiguration() {
        const value = await configurationCharacteristic.readValue();
        const text = decodeValue(value);
        try {
          currentConfiguration = JSON.parse(text);
        } catch (error) {
          writeStatus("Configuration JSON is incomplete. Flash the updated firmware with compact BLE configuration.", "warning");
          return;
        }
        applyConfiguration(currentConfiguration);
        writeStatus("Connected.", "connected");
        document.getElementById("introHint").hidden = true;
      }

      async function sendCommand(command, refreshAfter = true) {
        writeStatus(`Sending ${command.command} ...`);
        await commandCharacteristic.writeValue(encodeValue(JSON.stringify(command)));
        await wait(350);
        try {
          const statusValue = await statusCharacteristic.readValue();
          writeStatus(decodeValue(statusValue), "connected");
        } catch (_error) { writeStatus(`${command.command} sent.`, "connected"); }
        if (refreshAfter) { await readConfiguration(); }
      }

      async function sendCommandAndRefresh(command) { await sendCommand(command, true); }

      function applyConfiguration(config) {
        document.querySelector("h1").textContent = config.deviceName || "Camper module";
        document.getElementById("FLOWMETER").checked = config.FLOWMETER === true;
        setFlowMeterPinOptions(config.flowMeterPins || [2, 4, 12], config.FLOWMETERPin || 2);
        document.getElementById("SHT2X").checked = config.SHT2X === true;
        document.getElementById("BME280").checked = config.BME280 === true;
        document.getElementById("Environment").checked = config.SHT2X === true || config.BME280 === true;
        setEnvironmentEnabled(document.getElementById("Environment").checked);
        const last = config.last || {};
        if (last.environmentOk === true) {
          document.getElementById("lastTemperature").textContent = `${Number(last.temperature).toFixed(1)} C`;
          document.getElementById("lastHumidity").textContent = `${Number(last.humidity).toFixed(1)} %`;
          document.getElementById("lastEnvironmentStatus").textContent = "Last environment reading saved.";
        } else {
          document.getElementById("lastTemperature").textContent = "-";
          document.getElementById("lastHumidity").textContent = "-";
          document.getElementById("lastEnvironmentStatus").textContent = last.environmentError || "No environment reading saved yet.";
        }
        if (last.temperatureStatsOk === true) {
          document.getElementById("temperatureMin24h").textContent = `${Number(last.temperatureMin24h).toFixed(1)} C`;
          document.getElementById("temperatureMax24h").textContent = `${Number(last.temperatureMax24h).toFixed(1)} C`;
          document.getElementById("temperatureStatsStatus").textContent = `Min ${formatAge(last.temperatureMinAgeMinutes)}, max ${formatAge(last.temperatureMaxAgeMinutes)}.`;
        } else {
          document.getElementById("temperatureMin24h").textContent = "-";
          document.getElementById("temperatureMax24h").textContent = "-";
          document.getElementById("temperatureStatsStatus").textContent = "No 24h temperature stats yet.";
        }
        const pump = config.pump || {};
        const usesFlowMeter = pump.usesFlowMeter === true || config.FLOWMETER === true;
        document.getElementById("pumpStatus").textContent = pump.state || "-";
        document.getElementById("invertPWSignal").checked = pump.invert === true;
        document.getElementById("autoStopSeconds").value = pump.autoStopSeconds || 60;
        document.getElementById("noFlowStopSeconds").value = pump.noFlowStopSeconds || 3;
        document.getElementById("autoStopRow").hidden = usesFlowMeter;
        document.getElementById("noFlowStopRow").hidden = !usesFlowMeter;
        document.getElementById("pumpHint").textContent = usesFlowMeter
          ? "Flow meter is active. The pump stops after the no-flow delay."
          : "Flow meter is off. The pump stops after the auto-stop timer.";
      }

      function formatAge(minutes) {
        const value = Number(minutes || 0);
        if (value < 1) return "just now";
        if (value < 60) return `${value} min ago`;
        const hours = Math.floor(value / 60);
        const mins = value % 60;
        return mins > 0 ? `${hours} h ${mins} min ago` : `${hours} h ago`;
      }

      function setFlowMeterPinOptions(pins, selectedPin) {
        const select = document.getElementById("FLOWMETERPin");
        select.innerHTML = "";
        pins.forEach((pin) => {
          const option = document.createElement("option");
          option.value = String(pin);
          option.text = `GPIO${pin}`;
          select.appendChild(option);
        });
        select.value = String(selectedPin);
      }

      function showTab(tabId) {
        ["sensorsTab", "pumpTab", "exitTab"].forEach((id) => { document.getElementById(id).hidden = id !== tabId; });
        ["sensorsTabButton", "pumpTabButton", "exitTabButton"].forEach((id) => { document.getElementById(id).classList.remove("active"); });
        document.getElementById(`${tabId}Button`).classList.add("active");
      }

      function changeEnvironment(checkbox) {
        setEnvironmentEnabled(checkbox.checked);
        if (checkbox.checked && !document.getElementById("SHT2X").checked && !document.getElementById("BME280").checked) {
          document.getElementById("BME280").checked = true;
        }
      }

      function setEnvironmentEnabled(enabled) {
        document.getElementById("SHT2X").disabled = !enabled;
        document.getElementById("BME280").disabled = !enabled;
        if (!enabled) { document.getElementById("SHT2X").checked = false; document.getElementById("BME280").checked = false; }
      }

      async function saveSensors() {
        await sendCommand({
          command: "updateSensors",
          FLOWMETER: document.getElementById("FLOWMETER").checked,
          FLOWMETERPin: Number(document.getElementById("FLOWMETERPin").value),
          SHT2X: document.getElementById("SHT2X").checked,
          BME280: document.getElementById("BME280").checked,
        });
      }

      async function savePump() {
        await sendCommand({
          command: "updateWaterPump",
          invertPWSignal: document.getElementById("invertPWSignal").checked,
          autoStopSeconds: Number(document.getElementById("autoStopSeconds").value),
          noFlowStopSeconds: Number(document.getElementById("noFlowStopSeconds").value),
        });
      }

      async function exitSetup() {
        await sendCommand({ command: "exitSetup" }, false);
        writeStatus("Exit setup command sent. The controller should restart.", "connected");
      }

      function wait(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    </script>
  </body>
</html>
